<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Edit Field</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        color: #172b4d;
        background: #f4f5f7;
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #5e6c84;
      }
      input, select {
        width: 100%;
        padding: 8px;
        border: 2px solid #dfe1e6;
        border-radius: 3px;
        font-size: 14px;
        box-sizing: border-box;
        margin-bottom: 12px;
      }
      input:focus, select:focus {
        outline: none;
        border-color: #0079bf;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .checkbox-row input {
        width: auto;
        margin: 0;
      }
      button {
        background: #0079bf;
        color: #fff;
        border: none;
        border-radius: 3px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
      }
      button:hover {
        background: #026aa7;
      }
      .error {
        color: #c0392b;
        font-size: 13px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <label id="fieldLabel">Field</label>
      <div id="inputContainer"></div>
      <button type="button" id="saveBtn">Save</button>
      <div id="errorMsg" class="error"></div>
    </div>

    <script>
      var t = TrelloPowerUp.iframe();
      var fieldId = t.arg('fieldId');

      function loadBoardFields() {
        return t.get('board', 'shared', 'customFields', []);
      }

      function loadCardValues() {
        return t.get('card', 'shared', 'customFieldValues', {});
      }

      function saveCardValue(fieldId, value) {
        return loadCardValues().then(function (values) {
          values[fieldId] = value;
          return t.set('card', 'shared', 'customFieldValues', values);
        });
      }

      function createInput(field, currentValue) {
        var container = document.getElementById('inputContainer');
        container.innerHTML = '';
        var input;

        switch (field.type) {
          case 'checkbox':
            var wrapper = document.createElement('div');
            wrapper.className = 'checkbox-row';
            input = document.createElement('input');
            input.type = 'checkbox';
            input.id = 'fieldInput';
            input.checked = !!currentValue;
            var label = document.createElement('label');
            label.htmlFor = 'fieldInput';
            label.textContent = 'Yes';
            label.style.margin = '0';
            label.style.color = '#172b4d';
            wrapper.appendChild(input);
            wrapper.appendChild(label);
            container.appendChild(wrapper);
            return input;

          case 'dropdown':
            input = document.createElement('select');
            input.id = 'fieldInput';
            var emptyOption = document.createElement('option');
            emptyOption.value = '';
            emptyOption.textContent = '-- Select --';
            input.appendChild(emptyOption);
            (field.options || []).forEach(function (option) {
              var opt = document.createElement('option');
              opt.value = option.id;
              opt.textContent = option.label;
              if (currentValue === option.id) {
                opt.selected = true;
              }
              input.appendChild(opt);
            });
            container.appendChild(input);
            return input;

          case 'date':
            input = document.createElement('input');
            input.type = 'date';
            input.id = 'fieldInput';
            input.value = currentValue ? currentValue.substr(0, 10) : '';
            container.appendChild(input);
            return input;

          case 'number':
            input = document.createElement('input');
            input.type = 'number';
            input.id = 'fieldInput';
            input.value = currentValue !== undefined && currentValue !== null ? currentValue : '';
            container.appendChild(input);
            return input;

          case 'url':
            input = document.createElement('input');
            input.type = 'url';
            input.id = 'fieldInput';
            input.placeholder = 'https://example.com';
            input.value = currentValue || '';
            container.appendChild(input);
            return input;

          default: // text
            input = document.createElement('input');
            input.type = 'text';
            input.id = 'fieldInput';
            input.value = currentValue || '';
            container.appendChild(input);
            return input;
        }
      }

      function getInputValue(field, input) {
        switch (field.type) {
          case 'checkbox':
            return input.checked;
          case 'date':
            return input.value ? new Date(input.value).toISOString() : null;
          case 'number':
            return input.value === '' ? null : parseFloat(input.value);
          default:
            return input.value;
        }
      }

      t.render(function () {
        Promise.all([loadBoardFields(), loadCardValues()]).then(function (results) {
          var fields = results[0];
          var values = results[1];
          var field = fields.find(function (f) { return f.id === fieldId; });

          if (!field) {
            document.getElementById('errorMsg').textContent = 'Field not found.';
            return;
          }

          document.getElementById('fieldLabel').textContent = field.name;
          var input = createInput(field, values[fieldId]);

          document.getElementById('saveBtn').addEventListener('click', function () {
            var value = getInputValue(field, input);
            saveCardValue(fieldId, value).then(function () {
              t.set('card', 'shared', 'customFieldValues_lastUpdate', Date.now()).then(function () {
                t.closePopup();
              });
            }).catch(function (err) {
              document.getElementById('errorMsg').textContent = 'Error saving: ' + (err.message || err);
            });
          });

          t.sizeTo('#container').done();
        }).catch(function (err) {
          document.getElementById('errorMsg').textContent = 'Error loading: ' + (err.message || err);
        });
      });
    </script>
  </body>
</html>
