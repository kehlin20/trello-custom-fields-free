<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Custom Fields</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <div id="fieldsContainer"></div>

    <script>
      var t = TrelloPowerUp.iframe();

      function parseDescription(desc) {
        if (!desc) return {};
        var match = desc.match(/<!-- CUSTOM_FIELDS_START -->([\s\S]*?)<!-- CUSTOM_FIELDS_END -->/);
        if (!match) return {};
        try {
          return JSON.parse(match[1]);
        } catch (e) {
          return {};
        }
      }

      function formatDescription(desc, fieldValues) {
        var json = JSON.stringify(fieldValues, null, 2);
        var block = '\n\n<!-- CUSTOM_FIELDS_START -->\n' + json + '\n<!-- CUSTOM_FIELDS_END -->\n';
        
        // Remove existing block if present
        var cleaned = desc ? desc.replace(/<!-- CUSTOM_FIELDS_START -->[\s\S]*?<!-- CUSTOM_FIELDS_END -->/g, '').trim() : '';
        
        // Add formatted display
        var display = '\n\n## Custom Fields\n\n';
        Object.keys(fieldValues).forEach(function(fieldId) {
          var value = fieldValues[fieldId];
          if (value !== null && value !== undefined && value !== '') {
            display += '- **' + fieldId + '**: ' + value + '\n';
          }
        });
        
        return cleaned + display + block;
      }

      function loadBoardFields() {
        return t.get('board', 'shared', 'customFields', []);
      }

      function loadCardValues() {
        return t.card('desc').then(function(card) {
          return parseDescription(card.desc);
        });
      }

      function saveCardValue(fieldId, value) {
        return t.card('desc').then(function(card) {
          var values = parseDescription(card.desc);
          values[fieldId] = value;
          var newDesc = formatDescription(card.desc, values);
          return t.update({ desc: newDesc });
        });
      }

      function createInput(field, currentValue) {
        var container = document.createElement('div');
        container.className = 'card-field';

        var label = document.createElement('label');
        label.textContent = field.name;
        container.appendChild(label);

        var input;

        switch (field.type) {
          case 'checkbox':
            input = document.createElement('input');
            input.type = 'checkbox';
            input.checked = !!currentValue;
            input.addEventListener('change', function () {
              saveCardValue(field.id, input.checked).then(function () {
                t.closePopup();
              });
            });
            break;

          case 'dropdown':
            input = document.createElement('select');
            var emptyOption = document.createElement('option');
            emptyOption.value = '';
            emptyOption.textContent = '-- Select --';
            input.appendChild(emptyOption);
            (field.options || []).forEach(function (option) {
              var opt = document.createElement('option');
              opt.value = option.id;
              opt.textContent = option.label;
              if (currentValue === option.id) {
                opt.selected = true;
              }
              input.appendChild(opt);
            });
            input.addEventListener('change', function () {
              saveCardValue(field.id, input.value).then(function () {
                t.closePopup();
              });
            });
            break;

          case 'date':
            input = document.createElement('input');
            input.type = 'date';
            input.value = currentValue ? currentValue.substr(0, 10) : '';
            input.addEventListener('change', function () {
              var val = input.value ? new Date(input.value).toISOString() : null;
              saveCardValue(field.id, val).then(function () {
                t.closePopup();
              });
            });
            break;

          case 'number':
            input = document.createElement('input');
            input.type = 'number';
            input.value = currentValue !== undefined && currentValue !== null ? currentValue : '';
            input.addEventListener('change', function () {
              var val = input.value === '' ? null : parseFloat(input.value);
              saveCardValue(field.id, val).then(function () {
                t.closePopup();
              });
            });
            break;

          case 'url':
            input = document.createElement('input');
            input.type = 'url';
            input.placeholder = 'https://example.com';
            input.value = currentValue || '';
            input.addEventListener('change', function () {
              saveCardValue(field.id, input.value).then(function () {
                t.closePopup();
              });
            });
            break;

          default: // text
            input = document.createElement('input');
            input.type = 'text';
            input.value = currentValue || '';
            input.addEventListener('change', function () {
              saveCardValue(field.id, input.value).then(function () {
                t.closePopup();
              });
            });
        }

        container.appendChild(input);
        return container;
      }

      t.render(function () {
        Promise.all([loadBoardFields(), loadCardValues()]).then(function (results) {
          var fields = results[0];
          var values = results[1];
          var container = document.getElementById('fieldsContainer');
          container.innerHTML = '';

          if (fields.length === 0) {
            container.innerHTML = '<div class="empty-state">No custom fields configured. Open board settings to add fields.</div>';
            return;
          }

          fields.forEach(function (field) {
            var input = createInput(field, values[field.id]);
            container.appendChild(input);
          });

          t.sizeTo('#fieldsContainer').done();
        });
      });
    </script>
  </body>
</html>
